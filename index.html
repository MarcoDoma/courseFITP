<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FITP Padel — Studio Istruttore 1° Livello</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --bg2: #17171b;
  --bg3: #1f1f25;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0eff4;
  --text2: #9896a8;
  --text3: #5e5c6e;
  --accent: #7c6ef5;
  --accent2: #a594f9;
  --accent-bg: rgba(124,110,245,0.12);
  --accent-border: rgba(124,110,245,0.3);
  --green: #34d399;
  --green-bg: rgba(52,211,153,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --amber: #fbbf24;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

/* LAYOUT */
.app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; position: relative; }
.screen { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 80px; }
.screen::-webkit-scrollbar { display: none; }

/* NAV */
.nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: var(--bg2); border-top: 0.5px solid var(--border); display: flex; z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px 8px; border: none; background: transparent; color: var(--text3); font-size: 10px; font-family: inherit; cursor: pointer; transition: color .2s; }
.nav-btn.active { color: var(--accent2); }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 500; }

/* HEADER */
.page-header { padding: 20px 16px 12px; position: sticky; top: 0; background: var(--bg); z-index: 50; border-bottom: 0.5px solid var(--border); }
.page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
.page-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }

/* HOME */
.home-hero { padding: 24px 16px 20px; background: linear-gradient(135deg, var(--bg2) 0%, #1a1728 100%); border-bottom: 0.5px solid var(--border); }
.hero-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--accent-bg); border: 0.5px solid var(--accent-border); border-radius: 20px; padding: 4px 10px; font-size: 11px; font-weight: 500; color: var(--accent2); margin-bottom: 12px; }
.hero-title { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 6px; }
.hero-sub { font-size: 13px; color: var(--text2); line-height: 1.5; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 14px 16px; }
.stat-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
.stat-val { font-size: 24px; font-weight: 600; color: var(--accent2); font-family: 'DM Mono', monospace; }
.stat-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* PROGRESS OVERVIEW */
.prog-section { padding: 0 16px 16px; }
.section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .8px; margin: 16px 0 10px; }
.prog-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; }
.prog-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.prog-name { font-size: 14px; font-weight: 500; }
.prog-pct { font-size: 13px; font-weight: 600; color: var(--accent2); font-family: 'DM Mono', monospace; }
.prog-bar-wrap { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.prog-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }
.prog-bar.done { background: var(--green); }
.prog-meta { font-size: 11px; color: var(--text3); margin-top: 6px; }

/* PLAN */
.plan-list { padding: 0 16px; }
.day-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: border-color .15s; }
.day-card:active { border-color: var(--accent-border); }
.day-pill { width: 36px; height: 36px; border-radius: 50%; background: var(--accent-bg); border: 0.5px solid var(--accent-border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--accent2); flex-shrink: 0; font-family: 'DM Mono', monospace; }
.day-pill.done { background: var(--green-bg); border-color: rgba(52,211,153,0.3); color: var(--green); }
.day-info { flex: 1; min-width: 0; }
.day-n { font-size: 13px; font-weight: 500; }
.day-topics { font-size: 12px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-method { font-size: 11px; color: var(--accent2); margin-top: 3px; }
.day-check { font-size: 18px; }

/* SEZIONI */
.search-wrap { padding: 12px 16px; background: var(--bg); position: sticky; top: 0; z-index: 40; border-bottom: 0.5px solid var(--border); }
.search-input { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); font-size: 14px; font-family: inherit; outline: none; }
.search-input::placeholder { color: var(--text3); }
.sections-list { padding: 8px 16px; }
.sec-item { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 13px 14px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; display: flex; align-items: center; gap: 12px; }
.sec-item:active { border-color: var(--accent-border); }
.sec-icon-wrap { width: 38px; height: 38px; border-radius: var(--radius-sm); background: var(--accent-bg); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.sec-info { flex: 1; min-width: 0; }
.sec-name { font-size: 14px; font-weight: 500; }
.sec-progress { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
.sec-bar { flex: 1; height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
.sec-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
.sec-pct { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; width: 28px; text-align: right; }
.sec-arrow { color: var(--text3); font-size: 16px; }

/* DETAIL */
.detail-header { background: var(--bg); padding: 12px 16px 14px; position: sticky; top: 0; z-index: 50; border-bottom: 0.5px solid var(--border); }
.back-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--accent2); cursor: pointer; border: none; background: none; font-family: inherit; padding: 0; margin-bottom: 8px; }
.detail-title-row { display: flex; align-items: center; gap: 8px; }
.detail-icon { font-size: 20px; }
.detail-title { font-size: 18px; font-weight: 600; }
.detail-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }
.qa-list { padding: 12px 16px; }
.qa-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; transition: border-color .2s; }
.qa-card.read { border-color: rgba(52,211,153,0.25); }
.qa-q { padding: 14px 14px 0; font-size: 14px; font-weight: 500; line-height: 1.5; color: var(--text); }
.qa-num { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
.qa-ans-wrap { margin: 10px 14px; background: var(--accent-bg); border: 0.5px solid var(--accent-border); border-radius: var(--radius-sm); padding: 10px 12px; display: flex; align-items: flex-start; gap: 8px; }
.qa-check { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.qa-ans-text { font-size: 13px; font-weight: 500; color: var(--accent2); line-height: 1.4; }
.qa-exp { padding: 0 14px 14px; font-size: 13px; color: var(--text2); line-height: 1.6; }
.qa-exp::before { content: '💡 '; }
.mark-read-btn { display: block; width: calc(100% - 28px); margin: 0 14px 14px; padding: 9px; background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text3); font-size: 12px; font-family: inherit; cursor: pointer; text-align: center; transition: all .2s; }
.mark-read-btn.done { background: var(--green-bg); border-color: rgba(52,211,153,0.3); color: var(--green); }

/* FLASHCARD */
.flash-wrap { padding: 14px 16px; }
.flash-filter { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; }
.flash-filter::-webkit-scrollbar { display: none; }
.chip { padding: 6px 12px; border-radius: 20px; border: 0.5px solid var(--border2); font-size: 12px; font-weight: 500; cursor: pointer; background: var(--bg2); color: var(--text2); white-space: nowrap; transition: all .15s; }
.chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.flash-prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.flash-counter { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
.flash-score { font-size: 12px; color: var(--text2); }
.flash-prog-bar { height: 3px; background: var(--bg3); border-radius: 2px; margin-bottom: 14px; overflow: hidden; }
.flash-prog-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }
.flash-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: 16px; min-height: 220px; padding: 20px; cursor: pointer; transition: border-color .2s; display: flex; flex-direction: column; justify-content: space-between; margin-bottom: 12px; }
.flash-card.flipped { border-color: var(--accent-border); }
.flash-section-tag { font-size: 11px; color: var(--accent2); font-weight: 500; margin-bottom: 10px; }
.flash-question { font-size: 16px; font-weight: 500; line-height: 1.5; color: var(--text); }
.flash-tap-hint { font-size: 12px; color: var(--text3); margin-top: 12px; display: flex; align-items: center; gap: 4px; }
.flash-answer-wrap { display: none; margin-top: 14px; padding-top: 14px; border-top: 0.5px solid var(--border2); }
.flash-answer-wrap.show { display: block; }
.flash-answer { font-size: 14px; font-weight: 600; color: var(--green); margin-bottom: 8px; }
.flash-explain { font-size: 13px; color: var(--text2); line-height: 1.6; }
.flash-btns { display: flex; gap: 8px; }
.flash-btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); border: 0.5px solid; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; transition: opacity .15s; }
.flash-btn:active { opacity: .7; }
.fbtn-bad { background: var(--red-bg); border-color: rgba(248,113,113,0.3); color: var(--red); }
.fbtn-good { background: var(--green-bg); border-color: rgba(52,211,153,0.3); color: var(--green); }
.flash-reveal-btn { width: 100%; padding: 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text2); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; margin-bottom: 12px; transition: border-color .2s; }
.flash-reveal-btn:active { border-color: var(--accent-border); }
.session-summary { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; display: none; }
.summary-icon { font-size: 40px; margin-bottom: 8px; }
.summary-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.summary-sub { font-size: 13px; color: var(--text2); margin-bottom: 14px; }
.summary-stats { display: flex; justify-content: center; gap: 24px; margin-bottom: 14px; }
.summary-stat { text-align: center; }
.summary-stat-val { font-size: 22px; font-weight: 600; font-family: 'DM Mono', monospace; }
.summary-stat-lbl { font-size: 11px; color: var(--text2); }
.btn-primary { padding: 12px 24px; background: var(--accent); border: none; border-radius: var(--radius-sm); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }

/* NUMERI */
.nums-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 14px 16px; }
.num-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px; }
.num-val { font-size: 26px; font-weight: 600; color: var(--accent2); font-family: 'DM Mono', monospace; margin-bottom: 4px; }
.num-lbl { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.num-ctx { font-size: 11px; color: var(--text3); line-height: 1.4; }

/* TIPS */
.tips-box { margin: 0 16px 16px; background: var(--accent-bg); border: 0.5px solid var(--accent-border); border-radius: var(--radius); padding: 14px; }
.tip-row { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
.tip-row:last-child { margin-bottom: 0; }
.tip-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
.tip-text { font-size: 13px; color: var(--accent2); line-height: 1.5; }

/* RESET section stats btn */
.reset-btn { display: block; margin: 8px 16px 0; padding: 8px; background: transparent; border: 0.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text3); font-size: 11px; font-family: inherit; cursor: pointer; text-align: center; width: calc(100% - 32px); }
</style>
</head>
<body>
<div class="app">
  <!-- SCREENS -->
  <div class="screen" id="screen-home"></div>
  <div class="screen" id="screen-sezioni" style="display:none"></div>
  <div class="screen" id="screen-detail" style="display:none"></div>
  <div class="screen" id="screen-flash" style="display:none"></div>
  <div class="screen" id="screen-numeri" style="display:none"></div>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="nav-btn active" onclick="goTo('home',this)">
      <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
    </button>
    <button class="nav-btn" onclick="goTo('sezioni',this)">
      <span class="nav-icon">📚</span><span class="nav-label">Sezioni</span>
    </button>
    <button class="nav-btn" onclick="goTo('flash',this)">
      <span class="nav-icon">🃏</span><span class="nav-label">Flashcard</span>
    </button>
    <button class="nav-btn" onclick="goTo('numeri',this)">
      <span class="nav-icon">🔢</span><span class="nav-label">Numeri</span>
    </button>
  </nav>
</div>

<script>
// ========================
// DATA
// ========================
const SECTIONS = [
  {id:1,name:"Attività Didattiche",icon:"📚",cat:"organizzazione",qa:[
    {q:"Il Maestro Nazionale:",a:"Può lavorare in tutte le fasi didattiche",e:"Il Maestro Nazionale è la qualifica più alta (4° livello). Può operare in qualsiasi fase didattica, dall'avviamento all'alto livello. Le altre opzioni sono false: può allenare nell'alto livello e può occuparsi di tutti gli sport di racchetta."},
    {q:"La qualifica di Istruttore di 1° Grado/Livello:",a:"È triennale",e:"La qualifica dura 3 anni, non 2. Vale per padel, beach tennis, pickleball ecc. Non si rinnova con il Simposio Internazionale."},
    {q:"Il Corso di Preparatore Fisico di 1° Grado:",a:"È riservato ai laureati in Scienze Motorie",e:"Questo corso ha un requisito formativo specifico. Non è aperto a tutti gli insegnanti."},
    {q:"Il percorso per la qualifica di Istruttore di 1° Grado si articola in:",a:"3 step formativi",e:"Tre step: teoria + pratica + verifica/esame. Ricordati il numero 3 — né 2 né 4 né 5."},
    {q:"I C.A.P. e i C.A.T. si occupano di:",a:"Bambini dai 7 ai 10 anni circa",e:"Centri di Avviamento alla Pratica: fascia 7-10 anni. I C.P.A. si occupano della fascia 11-16/18 anni."}
  ]},
  {id:2,name:"Scuole Federali",icon:"🏫",cat:"organizzazione",qa:[
    {q:"L'ISF si occupa:",a:"Formazione insegnanti + settore tecnico nazionale Under 18",e:"L'ISF ha doppio ruolo: forma gli insegnanti E gestisce il settore tecnico under 18. Non è solo per tennis e padel, e non under 20."},
    {q:"I C.P.A.:",a:"Si occupano dell'attività dagli 11 ai 16-18 anni",e:"Centri di Preparazione Avanzata: fascia pre-agonismo e agonismo giovanile 11-16/18 anni. Non sono a Formia/Tirrenia."},
    {q:"L'Istruttore di 1° Grado può coordinare:",a:"Una Basic School",e:"1° grado = SOLO Basic School. Non Club School (qualifica superiore) né Standard School."},
    {q:"Nel Padel e nel Beach Tennis esistono:",a:"Club, Basic e Standard School (3 tipologie)",e:"3 tipologie per padel/beach. Il tennis ne ha 5 (Club-Basic-Standard-Super-Top)."},
    {q:"Il FIT Junior Program è un progetto per:",a:"Allievi NON in possesso della tessera agonistica",e:"Per chi inizia senza la pressione della competizione formale. Non per agonisti né per i C.A.P./C.P.A."}
  ]},
  {id:3,name:"Fasi Didattiche",icon:"🎓",cat:"didattica",qa:[
    {q:"Le fasi didattiche:",a:"Sono legate alle competenze (non all'età)",e:"Un bambino di 8 anni può essere in fase avanzata se ha le competenze. Ci sono 3 fasi: avviamento, perfezionamento, specializzazione."},
    {q:"\"Apprendere con consapevolezza\" è lo slogan:",a:"Del Perfezionamento",e:"Mini = Apprendere giocando/divertendosi. Perfezionamento = Apprendere con consapevolezza. Specializzazione = Individualizzazione."},
    {q:"Il Gioco-Sport si caratterizza per:",a:"Attrezzi, Spazi, Regole + Azioni di gioco (4 elementi)",e:"Non basta 'attrezzi, spazi, regole'. Ci vogliono anche le azioni di gioco che caratterizzano il gioco."},
    {q:"Rapporto insegnante/allievo nella Prima Fase:",a:"1 insegnante, 4 allievi",e:"Prima fase = 1:4. Perfezionamento = 1:2-3. Specializzazione può arrivare a 1:1."},
    {q:"Parola chiave della Specializzazione:",a:"Individualizzazione",e:"Nella specializzazione si lavora personalizzato sul singolo atleta. Non 'vincere', non 'consolidamento'."}
  ]},
  {id:4,name:"Principi Didattici",icon:"📐",cat:"didattica",qa:[
    {q:"I principi didattici:",a:"Sono fondamentali in TUTTE le fasi didattiche",e:"I 4 principi (multilateralità, multiformità, specificità, gradualità) si applicano sempre, non solo nella prima fase."},
    {q:"L'ordine delle aree nella Multilateralità:",a:"Mentale → Motoria → Tattica → Tecnica",e:"Non si parte mai dalla tecnica! Prima la mente, poi il corpo, poi il tattico, poi il tecnico. L'ordine non è casuale."},
    {q:"Il principio della Gradualità prevede:",a:"Percorrere tutti gli step dal più semplice al più complesso nella STESSA lezione",e:"Non è solo 'aumentare nel tempo' ma strutturare ogni singola lezione in progressione."},
    {q:"Il principio della Multiformità suggerisce:",a:"Di variare gli esercizi per raggiungere UN obiettivo",e:"Stesso obiettivo, modi diversi. Non si cambiano gli obiettivi, si cambia il modo per raggiungerli."},
    {q:"La Specificità dice che gli sport di racchetta sono:",a:"Di situazione, intermittenti, di combattimento",e:"NON 'di contatto'. Situazione = non si sa cosa farà l'avversario. Intermittenti = lavoro/recupero alternati."}
  ]},
  {id:5,name:"Conoscenze e Competenze",icon:"🧩",cat:"didattica",qa:[
    {q:"Area di conoscenza NON fondamentale per un istruttore:",a:"Gestione aziendale e finanza",e:"Servono fisiologia, biomeccanica, psicologia, pedagogia, metodi didattici. La finanza non è richiesta."},
    {q:"Aspetto cruciale nel processo di apprendimento dell'allievo:",a:"Il passaggio dalla comprensione teorica alla pratica",e:"Sapere non basta: l'allievo deve trasferire la conoscenza teorica al gesto pratico."},
    {q:"Fattore che contribuisce al successo dell'istruttore oltre la tecnica:",a:"Creare una relazione positiva e motivante con gli allievi",e:"Un istruttore tecnicamente perfetto ma incapace di motivare fallirà."},
    {q:"Cosa si intende per 'programmazione' nell'insegnamento:",a:"Processo strutturato e flessibile: valutazione, obiettivi, risorse",e:"Non è solo scegliere gli esercizi. È un processo completo: valuti, pianifichi, verifichi."},
    {q:"Competenza fondamentale per un istruttore:",a:"La capacità di motivare gli allievi",e:"La motivazione è il motore dell'apprendimento. Lingue, storia, social media sono accessori."}
  ]},
  {id:6,name:"Compiti e Responsabilità",icon:"⚖️",cat:"organizzazione",qa:[
    {q:"Responsabilità PRIORITARIA per un istruttore:",a:"Assicurare la sicurezza e l'incolumità fisica degli allievi",e:"La sicurezza viene SEMPRE prima. C'è responsabilità legale e morale sulla sicurezza."},
    {q:"Competenze fondamentali oltre a quelle tecniche:",a:"Pedagogiche, psicologiche e di gestione del gruppo",e:"Il triangolo: tecnica + pedagogia + psicologia. Non solo competenze linguistiche o informatiche."},
    {q:"Aspetto essenziale per garantire la sicurezza durante l'attività:",a:"Verifica dell'idoneità di luoghi, attrezzature ed esercitazioni",e:"La sicurezza è tridimensionale: spazio (campo) + strumenti (racchette) + contenuti (esercizi)."},
    {q:"Competenza sempre più richiesta agli istruttori:",a:"Documentare e presentare efficacemente le attività svolte",e:"Nell'era digitale saper documentare le attività (relazioni, report) è fondamentale."}
  ]},
  {id:7,name:"Il Contesto Operativo",icon:"🏗️",cat:"organizzazione",qa:[
    {q:"Il 'modello tecnico' per un istruttore è:",a:"Un'immagine mentale che guida le scelte durante l'insegnamento",e:"Non è un insieme di regole rigide né l'immagine di un campione. È una mappa flessibile e personalizzabile."},
    {q:"Perché adattare il modello tecnico all'allievo:",a:"Per massimizzare l'efficacia dell'insegnamento",e:"Ogni allievo è diverso. Applicare lo stesso schema a tutti non funziona."},
    {q:"Fattore che NON influenza la costruzione del modello tecnico:",a:"Le preferenze estetiche personali dell'istruttore",e:"Il modello è influenzato da esperienze sportive, biomeccanica, indicazioni federali — non da gusti personali."},
    {q:"Sport dove la tecnica rappresenta il RISULTATO FINALE:",a:"Sport valutativi con giuria (ginnastica, tuffi)",e:"In padel/tennis la tecnica è il mezzo per vincere il punto. Nella ginnastica artistica la tecnica È il risultato."}
  ]},
  {id:8,name:"Capacità Motorie",icon:"🏃",cat:"fisiologia",qa:[
    {q:"Differenza tra capacità motorie e abilità motorie:",a:"Le capacità sono i presupposti per lo sviluppo delle abilità",e:"Capacità = terreno fertile (coordinazione, forza...). Abilità = frutti (saper fare un dritto, un servizio)."},
    {q:"L'analizzatore più importante per la regolazione del movimento:",a:"Analizzatore visivo",e:"L'83% delle informazioni passa attraverso il canale visivo. La visione domina sugli altri sensi."},
    {q:"Le due categorie delle capacità motorie:",a:"Condizionali e coordinative",e:"Condizionali = Forza, Resistenza, Velocità, Mobilità. Coordinative = Equilibrio, Ritmo, Reazione, Orientamento."},
    {q:"La mobilità articolare è puramente condizionale?",a:"FALSO — ha componenti sia condizionali sia coordinative",e:"Ha parti muscolari (condizionale) E controllo neuromuscolare (coordinativa). Non è 'puramente' condizionale."},
    {q:"L'automatizzazione del movimento significa:",a:"Eseguire il movimento in modo fluido senza eccessivo controllo cosciente",e:"Come guidare dopo anni di pratica. Il dritto automatizzato lascia la mente libera per la tattica."}
  ]},
  {id:9,name:"Abilità Motorie",icon:"🤸",cat:"fisiologia",qa:[
    {q:"I tre tipi di abilità in base all'organizzazione del compito:",a:"Discrete, continue, seriali",e:"Discrete = inizio/fine definiti (servizio). Continue = senza fine definita (correre). Seriali = sequenza di discrete."},
    {q:"Criterio più rilevante per le abilità negli sport di racchetta:",a:"La variabilità ambientale",e:"Il padel è open: la palla arriva sempre diversa. Il contesto cambia continuamente → open skill."},
    {q:"'Abilità chiusa' significa:",a:"Un'abilità che si svolge in un contesto stabile e prevedibile",e:"Chiusa = stabile (ginnastica con routine fissa). Aperta = variabile (risposta a un colpo nel padel)."}
  ]},
  {id:10,name:"L'Apprendimento",icon:"📈",cat:"didattica",qa:[
    {q:"Differenza tra prestazione e apprendimento:",a:"Prestazione = risultato osservabile; Apprendimento = processo stabile sottostante",e:"Un allievo può avere una buona prestazione per fortuna. L'apprendimento è un cambiamento permanente."},
    {q:"Definizione corretta di apprendimento:",a:"Insieme dei processi che determinano un cambiamento STABILE del comportamento",e:"Chiave: STABILE. Se oggi va bene ma domani no, non c'è apprendimento vero."},
    {q:"Il 'plateau' nell'evoluzione tecnica è:",a:"Un periodo di stallo o leggera regressione SEGUITO DA UNA RIPRESA",e:"È normale nel percorso di apprendimento. Si ristagna apparentemente, poi si fa un salto. Non è una crisi!"},
    {q:"Perché una prestazione precoce non garantisce l'eccellenza:",a:"Può essere dovuta a fattori contingenti, non a un apprendimento solido",e:"Il bambino precoce può essere avvantaggiato dalla maturazione biologica. Se l'apprendimento non è solido, gli altri lo raggiungono."}
  ]},
  {id:11,name:"Organizzazione della Lezione",icon:"📖",cat:"didattica",qa:[
    {q:"Quante parti costituiscono una lezione tipo:",a:"3 parti",e:"Parte iniziale, parte centrale, parte finale. Sempre 3. Non 4 né 5."},
    {q:"Gli elementi della parte iniziale della lezione:",a:"Accoglienza → Attivazione → Familiarizzazione → Dimostrazione",e:"La sequenza corretta in 4 elementi. Nella fase iniziale 'stretta' ci sono solo i primi 3."},
    {q:"Quale parte occupa la maggior percentuale di tempo:",a:"La parte centrale (60-70%)",e:"Il cuore della lezione dove si lavora sull'obiettivo principale. Inizio e fine sono più brevi."},
    {q:"Tipo di esercitazioni consigliate nella parte finale:",a:"Esercitazioni gara",e:"La fine deve ricreare condizioni di gioco reale con competizione. Consolida tutto ciò che si è lavorato."},
    {q:"Rapporto ottimale nella fase del Perfezionamento:",a:"1 insegnante : 2-3 allievi",e:"Prima fase = 1:4. Perfezionamento = 1:2-3. Specializzazione può essere 1:1."}
  ]},
  {id:12,name:"Tipologie di Esercitazioni",icon:"🏋️",cat:"didattica",qa:[
    {q:"Cosa si intende per 'familiarizzazione':",a:"Far conoscere la palla e la racchetta agli allievi",e:"È il primissimo step: il bambino esplora gli attrezzi senza obiettivi tecnici precisi."},
    {q:"Tipi di attivazione motoria:",a:"Generale e Speciale",e:"Generale = corpo in senso ampio (corsa, mobilità). Speciale = specifica per la disciplina (movimenti simili al gioco)."},
    {q:"Le esercitazioni a blocchi si usano in quale situazione:",a:"Situazione chiusa",e:"A blocchi = stessa palla ripetuta. Per situazioni stabili, per consolidare il gesto tecnico."},
    {q:"Le esercitazioni variate sviluppano obiettivi:",a:"Tattici",e:"Modificano le variabili (direzione, velocità) mantenendo l'obiettivo. Sviluppano l'adattamento tattico."},
    {q:"Tipo di obiettivo raggiunto con le esercitazioni propedeutiche:",a:"Apprendimento tecnico-coordinativo",e:"Preparano al gesto tecnico attraverso movimenti simili ma più semplici."}
  ]},
  {id:13,name:"Concetto di Organizzazione",icon:"🗂️",cat:"organizzazione",qa:[
    {q:"Come definire il concetto di organizzazione:",a:"Uno strumento utile a fornire una struttura ordinata a qualcosa",e:"Non è solo il piano annuale né solo gestire gli allievi. È un concetto più ampio di strutturazione."},
    {q:"Elementi del modello formativo di un insegnante:",a:"Sapere → Saper fare → Saper far fare",e:"Prima conosco la teoria, poi la applico su me stesso, poi la trasmetto agli altri. Il terzo livello è il più alto."},
    {q:"Le 5 tipologie di scuole tennis in ordine:",a:"Club → Basic → Standard → Super → Top",e:"Ordine crescente di requisiti. Ricorda: C-B-S-S-T."},
    {q:"Cosa sono le soft skills in organizzazione:",a:"Le capacità mentali e didattiche",e:"Competenze trasversali 'invisibili': empatia, comunicazione, gestione delle emozioni, didattica."}
  ]},
  {id:14,name:"Area Mentale e COMETA",icon:"⭐",cat:"didattica",qa:[
    {q:"L'acronimo COMETA rappresenta:",a:"Un simbolo, un punto di riferimento, un esempio importante",e:"Le funzioni dell'insegnante come punto di riferimento luminoso per gli allievi."},
    {q:"Per 'Educare' in COMETA si intende:",a:"Sviluppare le potenzialità del bambino attraverso lo sport",e:"Educare = tirare fuori (e-ducere). Lo sport è il veicolo per sviluppare le potenzialità umane."},
    {q:"Obiettivo NON del livello Delfino:",a:"Volitività",e:"Il livello Delfino ha: Attenzione, Divertimento, Entusiasmo. La volitività è un obiettivo più avanzato."},
    {q:"Il bambino a 5-6 anni è:",a:"Desideroso di gratificazioni istantanee",e:"A 5-6 anni vive il 'qui e ora': vuole ricompense immediate, non risultati a lungo termine."},
    {q:"La volitività è:",a:"La capacità di darsi obiettivi chiari e definiti",e:"Non è empatia né imagery. È la determinazione trasformata in obiettivi concreti."},
    {q:"La Psicologia Positiva è finalizzata a lavorare su:",a:"Punti di forza della persona",e:"Non si focalizza su problemi/debolezze ma su risorse, punti di forza e benessere (Seligman)."},
    {q:"La corretta sequenza della triade delle competenze dell'insegnante:",a:"Sapere → Saper fare → Saper far fare",e:"Conoscenza teorica → applicazione pratica → trasmissione agli altri."},
    {q:"Howard Gardner è l'autore della teoria delle:",a:"Intelligenze Multiple (che include la creatività)",e:"Maslow = bisogni, Seligman = psicologia positiva, Miller = memoria, Gardner = intelligenze multiple."}
  ]},
  {id:15,name:"Sviluppo Psicologico del Bambino",icon:"👶",cat:"didattica",qa:[
    {q:"Processi che interagiscono nello sviluppo del bambino:",a:"Biologici, socio-emotivi, cognitivi",e:"Lo sviluppo è sempre multidimensionale: corpo, relazioni/emozioni e mente crescono insieme."},
    {q:"Come si apprende secondo Bandura oltre all'esperienza diretta:",a:"Tramite l'osservazione (modeling)",e:"Bandura = apprendimento osservativo. I bambini imparano guardando gli altri."},
    {q:"Stadio che NON fa parte di Piaget:",a:"Stadio pre-motorio (non esiste!)",e:"Piaget: Sensomotorio, Pre-operatorio, Operazioni Concrete, Operazioni Formali. Pre-motorio è inventato."},
    {q:"La parola di Vygotskij per lo sviluppo mediato da adulti:",a:"Scaffolding",e:"Impalcatura temporanea che si rimuove quando il bambino regge da solo."},
    {q:"Caratteristica del bambino in fase pre-operatoria (Piaget):",a:"Ha una visione prevalentemente egocentrica",e:"Non riesce a vedere il mondo dal punto di vista altrui. Non è ancora cooperativo."}
  ]},
  {id:16,name:"Le Emozioni",icon:"💫",cat:"didattica",qa:[
    {q:"Cosa si intende per 'stimolo emotigeno':",a:"Uno stimolo significativo che provoca un'emozione",e:"Non è neutrale. Ha un significato emotivo per quella persona e scatena una risposta emotiva."},
    {q:"Affermazione corretta sull'emozione:",a:"L'emozione ha una durata temporanea",e:"Le emozioni sono temporanee. Se si protraggono diventano stati d'umore o tratti di personalità."},
    {q:"Le funzioni principali delle emozioni sono:",a:"4 (motivazionale, comunicativa, adattiva, sociale)",e:"Queste 4 funzioni guidano il comportamento e le relazioni dell'essere umano."},
    {q:"L'ordine corretto delle componenti di un'emozione:",a:"Stimolo → Fisiologia → Comportamento → Interpretazione cognitiva",e:"Prima lo stimolo, poi il corpo reagisce (cuore, respiro), poi si agisce, poi la mente interpreta tutto."}
  ]},
  {id:17,name:"Triade Genitore-Allievo-Insegnante",icon:"👨‍👩‍👦",cat:"didattica",qa:[
    {q:"Le tipologie di genitore nel modello POZ (2006):",a:"3 tipologie",e:"Poco coinvolti, moderatamente coinvolti (zona ottimale), eccessivamente coinvolti."},
    {q:"Cosa si intende con 'LENA':",a:"Fatica emotiva, cognitiva e fisica",e:"Triplice fatica dei bambini nello sport: non solo fisica ma anche emotiva e cognitiva."},
    {q:"I genitori moderatamente coinvolti nel modello POZ:",a:"Rinforzano l'impegno e hanno un rapporto di fiducia con l'insegnante",e:"Il genitore 'ideale': supporta senza pressioni eccessive, collabora con fiducia."},
    {q:"La coesione tra i membri di un gruppo è:",a:"La forza di connessione tra i membri",e:"Non è solo intenzione, senso di appartenenza o motivazione. È la forza attrattiva che tiene insieme il gruppo."}
  ]},
  {id:18,name:"Comunicazione",icon:"💬",cat:"didattica",qa:[
    {q:"Il primo assioma della Scuola di Palo Alto:",a:"Non si può non comunicare — tutto comunica sempre, compresi i luoghi",e:"Il silenzio è comunicazione. L'ambiente è comunicazione. Anche un ritardo ha un significato comunicativo."},
    {q:"Sequenza effetti nello step formativo di avviamento:",a:"Effetto emozionale → cognitivo → conativo",e:"Prima si emoziona (curiosità), poi capisce (elabora), poi agisce. Si parte SEMPRE dall'emozione."},
    {q:"Cosa si intende per feedback:",a:"Risposta interna all'insegnante ED esterna dall'insegnante all'allievo",e:"Il feedback è duplice: interno (l'insegnante elabora ciò che osserva) ed esterno (comunicazione all'allievo)."},
    {q:"Sequenza consigliata dei feedback nell'avviamento:",a:"Generico → interrogativo → positivo → di gruppo",e:"Dal generico per non sovraccaricare → fa ragionare → rinforza → condivide con tutti."},
    {q:"Relazioni comunicative che pesano di più nel mini-sport:",a:"Tutte (insegnante-allievo, insegnante-genitore, insegnante-dirigente)",e:"Tutte le relazioni contano. Il mini-sport è un ecosistema sociale complesso."}
  ]},
  {id:19,name:"Sistemi e Apparati",icon:"❤️",cat:"fisiologia",qa:[
    {q:"Tipi di circolazione nell'uomo:",a:"2 (polmonare/piccola + sistemica/grande)",e:"Piccola = cuore → polmoni → cuore. Grande = cuore → tutto il corpo → cuore."},
    {q:"Le dimensioni del cuore di un tennista/padelista sono uguali al maratoneta?",a:"No — si adattano diversamente",e:"Il maratoneta ha volume interno maggiore. Il padelista ha pareti più spesse (intermittente vs resistenza)."},
    {q:"La ginnastica respiratoria può ridurre l'agitazione?",a:"Sì",e:"La respirazione diaframmatica lenta attiva il sistema nervoso parasimpatico, riducendo l'agitazione."},
    {q:"Quando è opportuno allenarsi rispetto ai pasti:",a:"Al termine della digestione",e:"Allenarsi durante la digestione crea conflitto: il sangue serve sia ai muscoli sia all'apparato digerente."},
    {q:"Quale allenamento stressa di più il sistema immunitario:",a:"Allenamento ad altissima intensità",e:"Gli allenamenti intensissimi deprimono temporaneamente il sistema immunitario (open window theory)."}
  ]},
  {id:20,name:"Meccanismi Energetici",icon:"⚡",cat:"fisiologia",qa:[
    {q:"Il meccanismo più potente (massima energia in poco tempo):",a:"Anaerobico alattacido (sistema fosfageno/ATP-CP)",e:"Dura 0-8 secondi. Usato per scatti esplosivi e smash potenti. Non produce lattato."},
    {q:"Il meccanismo più duraturo:",a:"Aerobico",e:"Usa ossigeno, produce energia lentamente ma in modo quasi inesauribile. Sistema della resistenza."},
    {q:"Il meccanismo anaerobico lattacido produce la maggior quantità di lattato?",a:"Sì",e:"Glicolisi anaerobica 8-90 secondi: genera lattato come sottoprodotto. Causa il 'bruciore' muscolare."},
    {q:"Spostamenti a breve raggio entro quanti metri:",a:"3 metri",e:"Nel padel/tennis moltissimi aggiustamenti di posizione avvengono entro 3 m."},
    {q:"Spostamenti a medio-lungo raggio entro quanti metri:",a:"6-12 metri",e:"Spostamenti ampi che richiedono accelerazione, decelerazione e cambi di direzione."}
  ]},
  {id:21,name:"Auxologia e Sviluppo",icon:"📏",cat:"fisiologia",qa:[
    {q:"Nella fase TURGOR si cresce in:",a:"Allungamento (in lunghezza)",e:"Turgor = cresce in altezza. Proceritas = il corpo si stabilizza/allarga. Si alternano in sequenza."},
    {q:"La 'fase d'oro' dell'apprendimento motorio va dagli:",a:"8 agli 11 anni",e:"Cervello plastico, corpo proporzionato, alta motivazione. Momento migliore per schemi motori complessi."},
    {q:"L'età biologica è sempre uguale a quella cronologica?",a:"No, mai",e:"Un bambino di 10 anni può avere la maturazione di un 8enne o di un 12enne."},
    {q:"Il bambino è più coordinato nella fase Turgor o Proceritas?",a:"Nella fase Turgor",e:"Nella Turgor il corpo è proporzionato. Nella Proceritas cambia più velocemente e la coordinazione può peggiorare."},
    {q:"Componente che crea la maggior motivazione nei bambini:",a:"Componente ludica e competitiva (insieme)",e:"Gioco (divertimento intrinseco) + competizione (sfida) insieme sono imbattibili come motivatori."},
    {q:"A quale età corrisponde 'l'età della ragione e periodo d'oro della motricità':",a:"7-11 anni",e:"Pensiero logico-concreto di Piaget + massima educabilità motoria in contemporanea."}
  ]},
  {id:22,name:"Sport Vision",icon:"👁️",cat:"fisiologia",qa:[
    {q:"Le informazioni che passano dal canale visivo:",a:"83% — la visione domina su tutti gli altri sensi",e:"Gli altri sensi contribuiscono per il 17%. La visione è il senso dominante nell'uomo."},
    {q:"I canali di apprendimento sono:",a:"Visivo, uditivo e cinestesico",e:"VAC: ogni persona ha il suo canale preferenziale. Un buon istruttore usa tutti e tre."},
    {q:"La visione è innata e immutabile?",a:"No — si può educare, potenziare, allenare e migliorare",e:"Come un muscolo: con la pratica specifica migliora. Non è fissa."},
    {q:"L'accomodazione visiva è:",a:"La capacità di variare la messa a fuoco da lontano a vicino e viceversa",e:"Fondamentale nel padel per seguire la palla che si avvicina rapidamente."},
    {q:"Il BDNF è:",a:"Brain-Derived Neurotrophic Factor — proteina prodotta dall'esercizio fisico",e:"Favorisce la neuroplasticità e la crescita neuronale. 'Fertilizzante del cervello'."}
  ]},
  {id:23,name:"Mini Padel e Junior Program",icon:"🏓",cat:"padel",qa:[
    {q:"L'area mentale appartiene al principio di:",a:"Multilateralità",e:"La multilateralità abbraccia tutte le aree: Mentale, Motoria, Tattica, Tecnica."},
    {q:"Misure del campo da minipadel RED:",a:"4 x 10 metri",e:"Il campo più piccolo per i più piccoli. 4m larghezza, 10m lunghezza."},
    {q:"La fase didattica del minipadel si riferisce di solito a:",a:"Bambini dai 5 ai 6 anni",e:"La fase più precoce. Non è limitata agli under 8."},
    {q:"Quanti campi RED si possono ricavare da 1 campo padel standard:",a:"4 campi RED",e:"Questa moltiplicazione degli spazi permette a più bambini di praticare contemporaneamente."},
    {q:"Passi del quaderno didattico del Mini Padel:",a:"10 passi",e:"Un percorso strutturato in 10 step progressivi."},
    {q:"L'argomento del secondo passo nel quaderno del Mini Padel:",a:"Diritto e Rovescio",e:"Il secondo passo introduce i colpi fondamentali dopo la fase iniziale di familiarizzazione."},
    {q:"Aree di riferimento del Mini Padel:",a:"Mentale - Fisica - Tattica - Tecnica",e:"Nota: qui compare 'Fisica' invece di 'Motoria'. Attenzione alla terminologia specifica del minipadel!"}
  ]},
  {id:24,name:"Area Tattica",icon:"🎯",cat:"padel",qa:[
    {q:"L'elemento fondamentale negli sport di situazione:",a:"Lo spazio-tempo",e:"Tutto dipende dalla gestione dello spazio (dove) e del tempo (quando colpisco, quanto ho per reagire)."},
    {q:"Il concetto di consistenza è il trinomio:",a:"Controllo → Regolarità → Precisione",e:"La consistenza nel padel si costruisce con questi tre elementi in questo ordine."},
    {q:"La zona GIALLA nelle fasi di gioco è:",a:"La zona di transizione",e:"Rosso = fondo/difesa. Giallo = transizione. Verde = rete/attacco."},
    {q:"Quale NON è un elemento della gestione dello spazio-tempo:",a:"Impugnatura",e:"Gestione spazio-tempo include: Traiettoria, Direzione, Profondità. L'impugnatura è un prerequisito tecnico."},
    {q:"Le situazioni di gioco nel padel sono:",a:"Servizio – Risposta – Fondo – Rete – Transizione avanti e indietro",e:"Le 6 situazioni fondamentali del padel."}
  ]},
  {id:25,name:"Area Tecnica",icon:"🔧",cat:"padel",qa:[
    {q:"Quale NON è un prerequisito della tecnica:",a:"Impatto",e:"I prerequisiti sono: Impugnatura, Posizione di Partenza, Studio della Palla. L'impatto è esecuzione, non prerequisito."},
    {q:"Quale è un prerequisito della tecnica:",a:"Impugnatura",e:"La fondamenta di tutta la tecnica. Prima di qualsiasi colpo si deve tenere correttamente la racchetta."},
    {q:"Un colpo 'in cooperazione' nel padel:",a:"Pallonetto con parete",e:"I colpi in cooperazione sfruttano le pareti del campo — caratteristica unica del padel."},
    {q:"Quale è un obiettivo della Tecnica:",a:"Azione dell'arto non dominante",e:"L'arto non dominante (braccio libero) aiuta equilibrio e rotazione. Controllo/Traiettoria sono obiettivi tattici."},
    {q:"Per facilitare l'apprendimento del ritmo esecutivo:",a:"Far eseguire movimenti brevi",e:"Movimenti brevi e controllati facilitano il timing del colpo. I movimenti ampi creano confusione."}
  ]},
  {id:26,name:"Stili di Insegnamento",icon:"👨‍🏫",cat:"didattica",qa:[
    {q:"Il rischio dello stile prescrittivo:",a:"Creare un colpitore, non un giocatore tatticamente completo",e:"Sviluppa gesti tecnici ma non il pensiero tattico. Bel colpitore che non sa cosa fare in partita."},
    {q:"Nel Game Based Approach la sequenza ottimale è:",a:"Introduzione al gioco → Partita → Fase di intervento",e:"Si inizia con il gioco, si lascia giocare (emergono i problemi), poi si interviene. L'apprendimento nasce dal bisogno reale."},
    {q:"L'obiettivo principale dello stile prescrittivo:",a:"Apprendimento del modello tecnico ottimale",e:"Efficace per la tecnica di base ma insufficiente per lo sviluppo completo del giocatore."},
    {q:"Per uno stile 'Scoperta Guidata' corretto si usa:",a:"Apprendimento individualizzato, correzione solo in presenza di eccesso di errore, feedback interrogativi",e:"La Scoperta Guidata fa ragionare l'allievo: non dice cosa fare ma guida a scoprirlo autonomamente."}
  ]},
  {id:27,name:"Storia del Padel",icon:"🏆",cat:"padel",qa:[
    {q:"Anno di nascita della Federazione Internazionale di Padel (FIP):",a:"1991",e:"La FIP nasce nel 1991. Il padel come sport nasce prima (anni '60-'70 in Messico con Enrique Corcuera)."},
    {q:"Migliore piazzamento della nazionale maschile italiana ai mondiali:",a:"Terzo posto",e:"Eccellente risultato considerando la competitività di Argentina e Spagna che dominano."},
    {q:"Cosa avvenne nel 2022:",a:"La FIT cambia nome in Federazione Italiana Tennis e Padel (F.I.T.P.)",e:"Svolta storica: riconoscimento ufficiale del padel nella federazione italiana."},
    {q:"Perché il 2019 è un anno storico per il padel italiano:",a:"L'Italia si aggiudica la prima medaglia europea",e:"Prima medaglia agli Europei di Padel — pietra miliare del padel italiano."},
    {q:"Come si è piazzata la nazionale femminile nei mondiali 2021-2022-2023-2024:",a:"Al terzo posto",e:"Stabilmente sul podio mondiale — un risultato eccellente considerando Argentina e Spagna."}
  ]},
  {id:28,name:"Il Sistema Italia",icon:"🇮🇹",cat:"organizzazione",qa:[
    {q:"L'innovazione del Sistema Italia:",a:"Coinvolgere simultaneamente settore tecnico nazionale e formazione insegnanti",e:"Un sistema unico: insegnanti e tecnici crescono insieme ai loro allievi. Non è solo organizzazione territoriale."},
    {q:"Il progetto 'Racchette in classe' a chi si rivolge:",a:"Scuole d'infanzia, elementari, medie e superiori",e:"Un progetto inclusivo che copre tutto l'arco scolastico. Non è limitato a una fascia."},
    {q:"Cos'è il Sistema Italia:",a:"Un sistema territoriale organizzativo, didattico-formativo",e:"Struttura completa: organizzazione territoriale + didattica + formazione insegnanti. Non solo un circuito agonistico."}
  ]},
  {id:29,name:"Regole di Padel",icon:"📜",cat:"regole",qa:[

// ========================
// PROGRESS (localStorage)
// ========================
const LS_KEY = 'fitp_progress_v2';
let progress = {};

function loadProgress() {
  try { progress = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { progress = {}; }
}
function saveProgress() {
  localStorage.setItem(LS_KEY, JSON.stringify(progress));
}
function markQA(secId, qaIdx, val) {
  if(!progress[secId]) progress[secId] = {};
  progress[secId][qaIdx] = val;
  saveProgress();
}
function isQARead(secId, qaIdx) { return !!(progress[secId] && progress[secId][qaIdx]); }
function getSectionPct(secId) {
  const sec = SECTIONS.find(s=>s.id===secId);
  if(!sec) return 0;
  const read = sec.qa.filter((_,i)=>isQARead(secId,i)).length;
  return Math.round((read/sec.qa.length)*100);
}
function isDayDone(dayN) {
  const key = 'day_'+dayN;
  return progress[key] === true;
}
function toggleDay(dayN) {
  const key = 'day_'+dayN;
  progress[key] = !progress[key];
  saveProgress();
  renderHome();
}
function getTotalRead() {
  return SECTIONS.reduce((acc,sec)=>acc+(sec.qa.filter((_,i)=>isQARead(sec.id,i)).length),0);
}
function getTotalQA() { return SECTIONS.reduce((acc,sec)=>acc+sec.qa.length,0); }

// ========================
// NAVIGATION
// ========================
let currentScreen = 'home';
function goTo(name, btn) {
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).style.display='block';
  if(btn) btn.classList.add('active');
  currentScreen = name;
  if(name==='home') renderHome();
  if(name==='sezioni') renderSections('');
  if(name==='flash') initFlash();
  if(name==='numeri') renderNums();
  document.getElementById('screen-'+name).scrollTop = 0;
}

function goToDetail(secId) {
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
  document.getElementById('screen-detail').style.display='block';
  renderDetail(secId);
  document.getElementById('screen-detail').scrollTop=0;
}
function backToSezioni() {
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
  document.getElementById('screen-sezioni').style.display='block';
}

// ========================
// HOME
// ========================
function renderHome() {
  const totalRead = getTotalRead();
  const totalQA = getTotalQA();
  const totalPct = Math.round((totalRead/totalQA)*100);
  const doneCount = SECTIONS.filter(s=>getSectionPct(s.id)===100).length;

  let html = `
  <div class="home-hero">
    <div class="hero-badge">🎾 Esame FITP · Istruttore 1° Livello</div>
    <div class="hero-title">Guida Padel</div>
    <div class="hero-sub">Tutte le risposte con spiegazioni, flashcard e piano in 7 giorni.</div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val">${SECTIONS.length}</div><div class="stat-lbl">Sezioni</div></div>
    <div class="stat-card"><div class="stat-val">${totalRead}</div><div class="stat-lbl">Lette</div></div>
    <div class="stat-card"><div class="stat-val">${totalPct}%</div><div class="stat-lbl">Completato</div></div>
  </div>
  <div class="prog-section">
    <div class="section-label">Progresso generale</div>
    <div class="prog-card">
      <div class="prog-top"><span class="prog-name">Domande studiate</span><span class="prog-pct">${totalRead} / ${totalQA}</span></div>
      <div class="prog-bar-wrap"><div class="prog-bar ${totalPct===100?'done':''}" style="width:${totalPct}%"></div></div>
      <div class="prog-meta">${doneCount} sezioni completate su ${SECTIONS.length}</div>
    </div>`;

  const cats = [...new Set(SECTIONS.map(s=>s.cat))];
  const catLabels = {organizzazione:'Organizzazione',didattica:'Didattica',fisiologia:'Fisiologia',padel:'Padel',regole:'Regole'};
  cats.forEach(cat=>{
    const secs = SECTIONS.filter(s=>s.cat===cat);
    const total = secs.reduce((a,s)=>a+s.qa.length,0);
    const read = secs.reduce((a,s)=>a+s.qa.filter((_,i)=>isQARead(s.id,i)).length,0);
    const pct = total>0?Math.round((read/total)*100):0;
    html += `
    <div class="prog-card">
      <div class="prog-top"><span class="prog-name">${catLabels[cat]||cat}</span><span class="prog-pct">${pct}%</span></div>
      <div class="prog-bar-wrap"><div class="prog-bar ${pct===100?'done':''}" style="width:${pct}%"></div></div>
      <div class="prog-meta">${read} / ${total} domande</div>
    </div>`;
  });

  html += `<div class="section-label">Piano di studio — 7 giorni</div>`;
  PLAN_DAYS.forEach(d=>{
    const done = isDayDone(d.n);
    html+=`
    <div class="day-card" onclick="toggleDay(${d.n})">
      <div class="day-pill ${done?'done':''}">G${d.n}</div>
      <div class="day-info">
        <div class="day-n">Giorno ${d.n}</div>
        <div class="day-topics">${d.topics}</div>
        <div class="day-method">${d.method}</div>
      </div>
      <span class="day-check">${done?'✅':'⬜'}</span>
    </div>`;
  });

  html += `
    <div class="section-label">Consigli</div>
    <div class="tips-box">
      <div class="tip-row"><span class="tip-icon">⏰</span><span class="tip-text">Sessioni da 30-40 min la sera — sfrutta il tuo ritmo notturno</span></div>
      <div class="tip-row"><span class="tip-icon">✍️</span><span class="tip-text">Dopo ogni sezione chiudi l'app e scrivi ciò che ricordi</span></div>
      <div class="tip-row"><span class="tip-icon">🔄</span><span class="tip-text">Ogni giorno ripassa il 20% del giorno precedente (spaced repetition)</span></div>
      <div class="tip-row"><span class="tip-icon">🎯</span><span class="tip-text">Attenzione alle domande con risposte simili — sono le più insidiose</span></div>
    </div>
  </div>`;

  document.getElementById('screen-home').innerHTML = html;
}

// ========================
// SEZIONI
// ========================
function renderSections(filter) {
  const q = filter.toLowerCase();
  const items = SECTIONS.filter(s=>s.name.toLowerCase().includes(q)||s.cat.toLowerCase().includes(q));
  let html = `
  <div class="page-header">
    <div class="page-title">Sezioni</div>
    <div class="page-sub">${SECTIONS.length} sezioni, ${getTotalQA()} domande totali</div>
  </div>
  <div class="search-wrap">
    <input class="search-input" type="search" placeholder="Cerca sezione..." value="${filter}" oninput="renderSections(this.value)" />
  </div>
  <div class="sections-list">`;
  items.forEach(s=>{
    const pct = getSectionPct(s.id);
    html+=`
    <div class="sec-item" onclick="goToDetail(${s.id})">
      <div class="sec-icon-wrap">${s.icon}</div>
      <div class="sec-info">
        <div class="sec-name">${s.name}</div>
        <div class="sec-progress">
          <div class="sec-bar"><div class="sec-bar-fill" style="width:${pct}%"></div></div>
          <span class="sec-pct">${pct}%</span>
        </div>
      </div>
      <span class="sec-arrow">›</span>
    </div>`;
  });
  html += '</div>';
  document.getElementById('screen-sezioni').innerHTML = html;
}

// ========================
// DETAIL
// ========================
function renderDetail(secId) {
  const sec = SECTIONS.find(s=>s.id===secId);
  const pct = getSectionPct(secId);
  let html = `
  <div class="detail-header">
    <button class="back-btn" onclick="backToSezioni()">‹ Tutte le sezioni</button>
    <div class="detail-title-row">
      <span class="detail-icon">${sec.icon}</span>
      <span class="detail-title">${sec.name}</span>
    </div>
    <div class="detail-meta">${sec.qa.length} domande · ${pct}% completato</div>
  </div>
  <div class="qa-list">`;

  sec.qa.forEach((qa,i)=>{
    const read = isQARead(secId, i);
    html+=`
    <div class="qa-card ${read?'read':''}" id="qa-${secId}-${i}">
      <div class="qa-num">D${i+1}</div>
      <div class="qa-q">${qa.q}</div>
      <div class="qa-ans-wrap">
        <span class="qa-check">✅</span>
        <span class="qa-ans-text">${qa.a}</span>
      </div>
      <div class="qa-exp">${qa.e}</div>
      <button class="mark-read-btn ${read?'done':''}" onclick="toggleRead(${secId},${i})">
        ${read?'✓ Studiata':'Segna come studiata'}
      </button>
    </div>`;
  });
  html+='</div>';
  document.getElementById('screen-detail').innerHTML = html;
}

function toggleRead(secId, qaIdx) {
  const cur = isQARead(secId, qaIdx);
  markQA(secId, qaIdx, !cur);
  const card = document.getElementById(`qa-${secId}-${qaIdx}`);
  if(card){
    card.className = `qa-card ${!cur?'read':''}`;
    const btn = card.querySelector('.mark-read-btn');
    if(btn){ btn.className=`mark-read-btn ${!cur?'done':''}`; btn.textContent=!cur?'✓ Studiata':'Segna come studiata'; }
  }
  const header = document.querySelector('.detail-meta');
  const sec = SECTIONS.find(s=>s.id===secId);
  if(header && sec) header.textContent=`${sec.qa.length} domande · ${getSectionPct(secId)}% completato`;
}

// ========================
// FLASHCARD
// ========================
let flashCards=[], flashIdx=0, flashRevealed=false, flashGood=0, flashBad=0, activeFlashFilter='all';

function initFlash() {
  let pool = SECTIONS.flatMap(s=>s.qa.map(q=>({...q,cat:s.cat,sec:s.name})));
  if(activeFlashFilter!=='all') pool=pool.filter(q=>q.cat===activeFlashFilter);
  flashCards = pool.sort(()=>Math.random()-.5);
  flashIdx=0; flashGood=0; flashBad=0; flashRevealed=false;
  renderFlash();
}

function setFlashFilter(f,el) {
  activeFlashFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  initFlash();
}

function renderFlash() {
  const total = flashCards.length;
  if(!total){ document.getElementById('screen-flash').innerHTML='<div style="padding:40px 16px;text-align:center;color:var(--text2);">Nessuna flashcard disponibile.</div>'; return; }
  if(flashIdx>=total){ renderFlashSummary(); return; }
  const card = flashCards[flashIdx];
  const pct = Math.round((flashIdx/total)*100);

  document.getElementById('screen-flash').innerHTML = `
  <div class="page-header"><div class="page-title">Flashcard</div><div class="page-sub">Tocca la scheda per vedere la risposta</div></div>
  <div class="flash-wrap">
    <div class="flash-filter">
      <div class="chip ${activeFlashFilter==='all'?'active':''}" onclick="setFlashFilter('all',this)">Tutte</div>
      <div class="chip ${activeFlashFilter==='organizzazione'?'active':''}" onclick="setFlashFilter('organizzazione',this)">Organizzazione</div>
      <div class="chip ${activeFlashFilter==='didattica'?'active':''}" onclick="setFlashFilter('didattica',this)">Didattica</div>
      <div class="chip ${activeFlashFilter==='fisiologia'?'active':''}" onclick="setFlashFilter('fisiologia',this)">Fisiologia</div>
      <div class="chip ${activeFlashFilter==='padel'?'active':''}" onclick="setFlashFilter('padel',this)">Padel</div>
      <div class="chip ${activeFlashFilter==='regole'?'active':''}" onclick="setFlashFilter('regole',this)">Regole</div>
    </div>
    <div class="flash-prog-row">
      <span class="flash-counter">${flashIdx+1} / ${total}</span>
      <span class="flash-score">✅ ${flashGood} &nbsp; ❌ ${flashBad}</span>
    </div>
    <div class="flash-prog-bar"><div class="flash-prog-fill" style="width:${pct}%"></div></div>
    <div class="flash-card ${flashRevealed?'flipped':''}" id="flash-card" onclick="revealFlash()">
      <div>
        <div class="flash-section-tag">${card.sec}</div>
        <div class="flash-question">${card.q}</div>
        ${!flashRevealed?`<div class="flash-tap-hint">👆 Tocca per vedere la risposta</div>`:''}
      </div>
      <div class="flash-answer-wrap ${flashRevealed?'show':''}">
        <div class="flash-answer">✅ ${card.a}</div>
        <div class="flash-explain">${card.e}</div>
      </div>
    </div>
    ${flashRevealed
      ? `<div class="flash-btns">
          <button class="flash-btn fbtn-bad" onclick="nextFlash(false)">❌ Da ripassare</button>
          <button class="flash-btn fbtn-good" onclick="nextFlash(true)">✅ Sapevo</button>
        </div>`
      : `<button class="flash-reveal-btn" onclick="revealFlash()">👁 Mostra risposta</button>`
    }
  </div>`;
}

function revealFlash() {
  if(flashRevealed) return;
  flashRevealed=true;
  renderFlash();
}
function nextFlash(knew) {
  if(knew) flashGood++; else flashBad++;
  flashIdx++; flashRevealed=false;
  renderFlash();
}
function renderFlashSummary() {
  const total=flashGood+flashBad;
  const pct=total>0?Math.round((flashGood/total)*100):0;
  document.getElementById('screen-flash').innerHTML=`
  <div class="page-header"><div class="page-title">Flashcard</div></div>
  <div class="flash-wrap">
    <div class="session-summary" style="display:block">
      <div class="summary-icon">${pct>=80?'🏆':pct>=60?'💪':'📚'}</div>
      <div class="summary-title">${pct>=80?'Ottimo lavoro!':pct>=60?'Buon risultato!':'Continua così!'}</div>
      <div class="summary-sub">${pct}% di risposte corrette in questa sessione</div>
      <div class="summary-stats">
        <div class="summary-stat"><div class="summary-stat-val" style="color:var(--green)">${flashGood}</div><div class="summary-stat-lbl">Sapevo</div></div>
        <div class="summary-stat"><div class="summary-stat-val" style="color:var(--red)">${flashBad}</div><div class="summary-stat-lbl">Da ripassare</div></div>
        <div class="summary-stat"><div class="summary-stat-val" style="color:var(--accent2)">${total}</div><div class="summary-stat-lbl">Totale</div></div>
      </div>
      <button class="btn-primary" onclick="initFlash()">Ricomincia 🔁</button>
    </div>
  </div>`;
}

}
